<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Receptionist</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <h1>Welcome to Your AI Receptionist</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="about">
            <h2>About Us</h2>
            <p>Your AI receptionist is here to help you manage your reminders and appointments.</p>
        </section>
        <section id="services">
            <h2>Services</h2>
            <div>
                <a href="appointments.html" class="service-button">Appointment Scheduling</a>
                <a href="remainder.html" class="service-button" >Reminder Notifications</a>
                <a href="task.html" class="service-button" >Task Management</a>
            </div>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 AI Receptionist. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
