<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Receptionist - Appointments</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/appointment.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/appointments">Appointments</a></li>
                <li><a href="/remainder">Reminders</a></li>
                <li><a href="/task">Tasks</a></li>
                <li><a href="mailto:support@aireceptionist.com">Contact</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h1>Manage Appointments</h1>

        <!-- Toggle Button for New Appointment -->
        <div style="text-align: center; margin-bottom: 25px;">
            <button id="toggleFormBtn" onclick="toggleForm()" style="width: auto; padding: 12px 24px; background: linear-gradient(135deg, #2575fc, #6a11cb); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: transform 0.2s;">➕ New Appointment</button>
        </div>

        <!-- Collapsible Form Section -->
        <div id="formSection" style="display: none; background: rgba(0,0,0,0.02); padding: 20px; border-radius: 10px; border: 1px dashed #cbd5e1; margin-bottom: 25px;">
            <form id="appointmentForm">
                <label for="eventName">Event Name:</label>
                <input type="text" id="eventName" name="event_name" required placeholder="Enter event name">
                
                <label for="eventDate">Event Date:</label>
                <input type="datetime-local" id="eventDate" name="event_date" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
                
                <label for="category">Type of Appointment:</label>
                <select id="category" name="category" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; background: white;">
                    <option value="appointment">Appointment</option>
                    <option value="remainder">Reminder</option>
                    <option value="to-do-task">To-Do Task</option>
                </select>
                
                <button type="submit">Add Appointment</button>
            </form>
        </div>
        
        <!-- Display Upcoming Appointments -->
        <div class="appointment-list-section" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
            <h2 style="color: #2575fc; font-size: 1.8em; text-align: center; margin-bottom: 15px;">Upcoming Appointments</h2>
            <div id="noAppointments" style="text-align: center; color: #666; font-style: italic; margin-top: 10px;">No appointments scheduled.</div>
            <div id="appointmentList" style="margin-top: 15px;"></div>
        </div>

        <div class="footer">Your virtual assistant for reminders!</div>
    </div>

    <!-- Edit Modal Dialog -->
    <div id="editModal" class="modal" style="display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px);">
        <div class="modal-content" style="background-color: #ffffff; margin: 10% auto; padding: 25px 30px; border: 1px solid #e2e8f0; width: 90%; max-width: 450px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); position: relative;">
            <span class="modal-close" onclick="closeEditModal()" style="position: absolute; right: 20px; top: 15px; color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            <h2 style="color: #2575fc; margin-top: 0; margin-bottom: 20px;">Edit Entry</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                
                <label for="editName">Name/Title:</label>
                <input type="text" id="editName" required placeholder="Enter name or title">
                
                <label for="editDate">Date & Time:</label>
                <input type="datetime-local" id="editDate" required>
                
                <label for="editEmail">Email:</label>
                <input type="email" id="editEmail" required placeholder="Enter email address">
                
                <label for="editCategory">Type / Category:</label>
                <select id="editCategory" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; box-sizing: border-box; background: white; margin-bottom: 15px;">
                    <option value="appointment">Appointment</option>
                    <option value="remainder">Reminder</option>
                    <option value="to-do-task">To-Do Task</option>
                </select>
                
                <button type="submit" style="width: 100%; padding: 12px; margin-top: 20px; background: linear-gradient(135deg, #2575fc, #6a11cb); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer;">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Beautiful Custom Confirmation Dialog -->
    <div id="confirmModal" class="modal" style="display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px);">
        <div class="modal-content" style="background-color: #ffffff; margin: 15% auto; padding: 25px 30px; border: 1px solid #e2e8f0; width: 90%; max-width: 400px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); text-align: center; position: relative;">
            <div style="font-size: 50px; margin-bottom: 15px;">🗑️</div>
            <h3 style="color: #333; margin-top: 0; margin-bottom: 10px; font-size: 1.4rem;">Confirm Delete</h3>
            <p id="confirmMessage" style="color: #666; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.4;">Are you sure you want to delete this entry?</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button id="confirmCancelBtn" style="padding: 10px 20px; background: #e2e8f0; color: #475569; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; flex: 1;">Cancel</button>
                <button id="confirmOkBtn" style="padding: 10px 20px; background: #ff4b4b; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; flex: 1;">Delete</button>
            </div>
        </div>
    </div>

    <script>
        function toggleForm() {
            const formSection = document.getElementById('formSection');
            const toggleBtn = document.getElementById('toggleFormBtn');
            if (formSection.style.display === 'none') {
                formSection.style.display = 'block';
                toggleBtn.innerText = '➖ Hide Form';
            } else {
                formSection.style.display = 'none';
                toggleBtn.innerText = '➕ New Appointment';
            }
        }

        // Dynamic Submit Button Text based on Type of Appointment selection
        const categorySelect = document.getElementById('category');
        const submitButton = document.querySelector('#appointmentForm button[type="submit"]');

        categorySelect.addEventListener('change', function() {
            const selected = categorySelect.value;
            if (selected === 'remainder') {
                submitButton.innerText = 'Add Reminder';
            } else if (selected === 'to-do-task') {
                submitButton.innerText = 'Add Task';
            } else {
                submitButton.innerText = 'Add Appointment';
            }
        });

        function showToast(message, isError = false) {
            const toast = document.getElementById('customToast');
            const title = toast.querySelector('.toast-title');
            const icon = toast.querySelector('.toast-icon');
            
            document.getElementById('toastMessage').innerText = message;
            
            if (isError) {
                toast.style.borderColor = 'rgba(255, 75, 75, 0.4)';
                title.style.color = '#ff4b4b';
                title.innerText = 'Error';
                icon.innerText = '⚠️';
            } else {
                toast.style.borderColor = 'rgba(37, 117, 252, 0.2)';
                title.style.color = '#2575fc';
                title.innerText = 'Success';
                icon.innerText = '✨';
            }
            
            toast.classList.add('show');
            setTimeout(() => {
                closeToast();
            }, 4000);
        }

        function closeToast() {
            const toast = document.getElementById('customToast');
            toast.classList.remove('show');
        }

        const appointmentList = document.getElementById('appointmentList');
        const noAppointments = document.getElementById('noAppointments');
        let appointmentsData = [];

        function fetchAppointments() {
            fetch('/get_events?category=appointment')
                .then(response => response.json())
                .then(appointments => {
                    appointmentsData = appointments;
                    appointmentList.innerHTML = '';
                    if (appointments.length === 0) {
                        noAppointments.style.display = 'block';
                    } else {
                        noAppointments.style.display = 'none';
                        appointments.forEach(app => {
                            const item = document.createElement('div');
                            item.style.background = '#f9f9f9';
                            item.style.padding = '12px 15px';
                            item.style.marginBottom = '10px';
                            item.style.borderRadius = '8px';
                            item.style.display = 'flex';
                            item.style.justifyContent = 'space-between';
                            item.style.alignItems = 'center';
                            item.style.boxShadow = '0 2px 5px rgba(0,0,0,0.05)';
                            
                            item.innerHTML = `
                                <div>
                                    <strong style="color: #333;">${app.eventName}</strong><br>
                                    <small style="color: #666;">${new Date(app.eventDate).toLocaleString()} - ${app.email}</small>
                                </div>
                                <div style="display: flex; gap: 8px;">
                                    <button onclick="handleEdit(${app.id})" style="background: #2575fc; color: white; border: none; border-radius: 5px; padding: 6px 12px; cursor: pointer; font-size: 0.85em;">✏️</button>
                                    <button onclick="deleteAppointment(${app.id})" style="background: #ff4b4b; color: white; border: none; border-radius: 5px; padding: 6px 12px; cursor: pointer; font-size: 0.85em;">🗑️</button>
                                </div>
                            `;
                            appointmentList.appendChild(item);
                        });
                    }
                })
                .catch(err => console.error('Error fetching appointments:', err));
        }

        function handleEdit(id) {
            const app = appointmentsData.find(a => a.id === id);
            if (app) {
                openEditModal(app);
            }
        }

        function showConfirm(message, onConfirm) {
            const confirmModal = document.getElementById('confirmModal');
            const confirmMessage = document.getElementById('confirmMessage');
            const confirmOkBtn = document.getElementById('confirmOkBtn');
            const confirmCancelBtn = document.getElementById('confirmCancelBtn');

            confirmMessage.innerText = message;
            confirmModal.style.display = 'block';

            // Clean up old event listeners by replacing buttons with clones
            const newOkBtn = confirmOkBtn.cloneNode(true);
            const newCancelBtn = confirmCancelBtn.cloneNode(true);
            confirmOkBtn.parentNode.replaceChild(newOkBtn, confirmOkBtn);
            confirmCancelBtn.parentNode.replaceChild(newCancelBtn, confirmCancelBtn);

            newOkBtn.addEventListener('click', () => {
                confirmModal.style.display = 'none';
                onConfirm();
            });

            newCancelBtn.addEventListener('click', () => {
                confirmModal.style.display = 'none';
            });
        }

        function deleteAppointment(id) {
            showConfirm('Are you sure you want to delete this appointment?', () => {
                fetch(`/delete_event/${id}`, { method: 'DELETE' })
                    .then(res => res.json())
                    .then(data => {
                        fetchAppointments();
                        showToast(data.message);
                    })
                    .catch(err => console.error('Error deleting appointment:', err));
            });
        }

        document.getElementById('appointmentForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data =  {
                eventName: formData.get('event_name'),
                eventDate: formData.get('event_date'),
                email: formData.get('email'),
                category: formData.get('category')
            };

            fetch('/add_appointment', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            })
            .then(response => response.json())
            .then(data => {
                showToast(data.message);
                document.getElementById('appointmentForm').reset();
                submitButton.innerText = 'Add Appointment'; // Reset button label to default
                toggleForm(); // Hide the form section
                fetchAppointments(); // Reload list
            })
            .catch(error => {
                console.error('Error:', error);
                showToast('There was an error adding the appointment.', true);
            });
        });

        // Edit Modal Operations
        function openEditModal(item) {
            const modal = document.getElementById('editModal');
            document.getElementById('editId').value = item.id;
            document.getElementById('editName').value = item.eventName;
            
            const date = new Date(item.eventDate);
            const localISOTime = new Date(date.getTime() - (date.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
            document.getElementById('editDate').value = localISOTime;
            
            document.getElementById('editEmail').value = item.email || '';
            document.getElementById('editCategory').value = item.category;
            
            modal.style.display = 'block';
        }

        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.style.display = 'none';
        }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const updated = {
                eventName: document.getElementById('editName').value,
                eventDate: document.getElementById('editDate').value,
                email: document.getElementById('editEmail').value,
                category: document.getElementById('editCategory').value
            };

            fetch(`/edit_event/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updated)
            })
            .then(res => res.json())
            .then(data => {
                showToast(data.message);
                closeEditModal();
                fetchAppointments();
            })
            .catch(err => {
                console.error(err);
                showToast('Error updating entry.', true);
            });
        });

        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                closeEditModal();
            }
        }

        // Disable past dates in datetime-local inputs
        function setMinDateTimes() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const localISO = `${year}-${month}-${day}T${hours}:${minutes}`;

            document.querySelectorAll('input[type="datetime-local"]').forEach(input => {
                input.min = localISO;
            });
        }

        // Load appointments and apply min dates on page launch
        fetchAppointments();
        setMinDateTimes();
    </script>
</body>
</html>
